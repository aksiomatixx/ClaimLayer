name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend unit + integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Python (mock ADP / FileHandler servers) ──────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mock server dependencies
        run: pip install fastapi uvicorn pydantic

      - name: Start mock ADP (port 8001)
        run: |
          python backend/mocks/mock_adp.py &
          echo "ADP_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            curl -sf http://localhost:8001/health && break
            sleep 1
          done

      - name: Start mock FileHandler (port 8002)
        run: |
          python backend/mocks/mock_filehandler.py &
          echo "FH_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            curl -sf http://localhost:8002/health && break
            sleep 1
          done

      # ── Node.js ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (lockfile-exact)
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          # JWT — static value for tests only, not used in production
          JWT_SECRET: ci-test-jwt-secret-not-for-production
          # Mock servers
          FILEHANDLER_API_KEY: mock-fh-key
          FILEHANDLER_BASE_URL: http://localhost:8002
          ADP_CLIENT_ID: mock
          ADP_CLIENT_SECRET: mock
          ADP_AUTH_URL: http://localhost:8001/auth/oauth/v2/token
          ADP_BASE_URL: http://localhost:8001
          # Real Claude API — injected from repository secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm test -- --forceExit --testTimeout=30000

      - name: Stop mock servers
        if: always()
        run: |
          kill $ADP_PID $FH_PID 2>/dev/null || true

  frontend:
    name: Frontend tests + production build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (lockfile-exact)
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Production build
        working-directory: frontend
        run: npm run build

  migrations:
    name: Migrations + schema contract (real PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (lockfile-exact)
        working-directory: backend
        run: npm ci

      # Applies every migration in filename order to a clean database,
      # re-applies the hardening migration (idempotency), then runs the
      # schema-contract integration assertions — code that writes a
      # column no migration created fails HERE, not in production.
      - name: Apply migrations + run schema-contract integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: node backend/scripts/migration-contract-test.js
