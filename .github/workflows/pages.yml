name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; never cancel an in-flight production
# deployment in favor of a newer one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy website/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # The site is static — no build step. Upload only website/
      # (index.html, assets/, demo/, CNAME).
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/

      - id: deployment
        uses: actions/deploy-pages@v4
